[server]
host = "0.0.0.0"
port = 8731

[web]
ui = "vue3"
static_dir = "./web"

[runtime]
requires_foundation = true
requires_kernel = true
allow_private_kernel_fallback = false
unified_io = "reserved"

[network]
lan_bind = true
auth = "reserved"

[security]
redact_secrets = true
provider_live_call = false
tool_execution = false
memory_write = false
